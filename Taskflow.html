    <script>
        // --- 1. LLAVES DE LAS APIS  ---
        const TELEGRAM_TOKEN = ''; 
        const GROQ_API_KEY = ''; 
        const GEMINI_API_KEY = '';

        // ☁️ LLAVES DE FIREBASE (Pega las que sacaste en el Paso 2 aquí)
        const firebaseConfig = {
           apiKey: "",
  authDomain:" ",
  projectId: "",
  storageBucket: "",
  messagingSenderId: "",
  appId: ""
        };

        // --- 2. INICIALIZACIÓN DE LA BASE DE DATOS ---
        let db = null;
        let lastUpdateId = 0; 
        let tasks = []; // Ahora empieza vacío y se llena desde Firebase
        let currentDate = new Date(); let currentView = 'month'; let selectedColor = 'blue'; let editingTaskId = null; let currentSubtasks = [];

        if (!firebaseConfig.apiKey.includes("PEGAR_AQUI")) {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        }

        // 🌟 NUEVO: Función para guardar en la nube en vez de LocalStorage
        async function guardarTareasLocalmente() { 
            if (db) {
                try {
                    // Guardamos todo el array de tareas en un solo documento para sincronización instantánea
                    await db.collection("usuario").doc("mis_tareas").set({ lista: tasks });
                    console.log("☁️ Guardado en la nube exitoso");
                } catch(e) { console.error("Error guardando en Firebase:", e); }
            } else {
                // Si no has puesto las llaves, usa tu memoria local de repuesto
                localStorage.setItem('taskflow_tasks', JSON.stringify(tasks)); 
            }
        }

        // 🌟 NUEVO: Función para descargar de la nube al entrar a la página
        async function cargarTareasIniciales() {
            const statusIndicator = document.getElementById('cloud-status');
            if (db) {
                try {
                    const doc = await db.collection("usuario").doc("mis_tareas").get();
                    if (doc.exists) { tasks = doc.data().lista || []; }
                    // Indicador verde: Conectado a la nube
                    statusIndicator.innerHTML = '<span class="relative inline-flex rounded-full h-2 w-2 bg-green-500" title="Sincronizado con la Nube"></span>';
                } catch(e) { 
                    console.error("Error cargando de Firebase:", e); 
                    statusIndicator.innerHTML = '<span class="relative inline-flex rounded-full h-2 w-2 bg-red-500" title="Error de conexión"></span>';
                }
            } else {
                tasks = JSON.parse(localStorage.getItem('taskflow_tasks')) || [];
                // Indicador gris: Modo Local
                statusIndicator.innerHTML = '<span class="relative inline-flex rounded-full h-2 w-2 bg-gray-400" title="Modo Local (Sin Nube)"></span>';
            }
            updateDashboard();
        }


        // 🌟 SINTETIZADOR DE AUDIO WEB
        function playSuccessSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1); 
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            } catch(e) {} 
        }

        // 🐾 EASTER EGG NECO-ARC (CON GIF)
        let necoClicks = 0;
        document.getElementById('user-avatar').addEventListener('click', () => {
            necoClicks++;
            if (necoClicks === 5) {
                document.getElementById('user-avatar').innerHTML = '<img src="neco.gif" alt="Neco Arc" class="w-full h-full object-cover rounded-full" />';
                document.getElementById('avatar-quote').textContent = '"BURU NYUU~"';
                document.body.classList.add('neco-mode');
                playSuccessSound(); 
            }
        });

        // 🧊 LÓGICA TILT 3D PARA TARJETAS
        function applyTiltEffect(cardElement) {
            cardElement.addEventListener('mousemove', (e) => {
                const rect = cardElement.getBoundingClientRect();
                const x = e.clientX - rect.left; 
                const y = e.clientY - rect.top;
                const xc = rect.width / 2; const yc = rect.height / 2;
                const dx = x - xc; const dy = y - yc;
                cardElement.style.transform = `rotateY(${dx / 15}deg) rotateX(${-dy / 15}deg)`;
            });
            cardElement.addEventListener('mouseleave', () => {
                cardElement.style.transform = 'rotateY(0) rotateX(0)'; 
            });
        }

        // --- CLIMA ---
        async function actualizarClima() {
            try {
                const url = "https://api.open-meteo.com/v1/forecast?latitude=19.0413&longitude=-98.2062&current_weather=true";
                const response = await fetch(url);
                const data = await response.json();
                if (data.current_weather) {
                    const code = data.current_weather.weathercode;
                    let icono = "☁️"; 
                    if (code === 0) icono = "☀️"; else if (code >= 1 && code <= 3) icono = "⛅"; else if (code >= 45 && code <= 48) icono = "🌫️"; else if (code >= 51 && code <= 67) icono = "🌧️"; else if (code >= 71 && code <= 77) icono = "❄️"; else if (code >= 80 && code <= 82) icono = "🌧️"; else if (code >= 95 && code <= 99) icono = "⛈️";
                    document.getElementById('weather-temp').textContent = `${Math.round(data.current_weather.temperature)}°C`;
                    document.getElementById('weather-icon').textContent = icono;
                }
            } catch (error) { document.getElementById('weather-icon').textContent = "❌"; }
        }
        actualizarClima(); setInterval(actualizarClima, 1800000);

        // --- MODO OSCURO ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        function updateThemeIcon() { document.getElementById('theme-icon').textContent = document.documentElement.classList.contains('dark') ? 'light_mode' : 'dark_mode'; }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); } else { document.documentElement.classList.remove('dark'); }
        updateThemeIcon();
        themeToggleBtn.addEventListener('click', function() { document.documentElement.classList.toggle('dark'); localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); updateThemeIcon(); });

        // --- MENÚS ---
        const userMenuBtn = document.getElementById('user-menu-btn');
        const userDropdown = document.getElementById('user-dropdown');
        const notifBtn = document.getElementById('notifications-btn');
        const notifDropdown = document.getElementById('notifications-dropdown');
        userMenuBtn.addEventListener('click', (e) => { e.stopPropagation(); userDropdown.classList.toggle('hidden'); notifDropdown.classList.add('hidden'); });
        notifBtn.addEventListener('click', (e) => { e.stopPropagation(); notifDropdown.classList.toggle('hidden'); userDropdown.classList.add('hidden'); });

            }
        }
        async function responderTelegram(chatId, mensaje) { try { await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: chatId, text: mensaje }) }); } catch (error) {} }
        async function transcribirAudio(fileUrl) {
            try {
                const proxyUrl = "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(fileUrl); const audioResponse = await fetch(proxyUrl); if (!audioResponse.ok) return null;
                const audioBlob = await audioResponse.blob(); if (audioBlob.size < 1000) return null;
                const formData = new FormData(); formData.append("file", audioBlob, "mensaje.ogg"); formData.append("model", "whisper-large-v3"); formData.append("response_format", "json"); formData.append("language", "es");
                const groqResponse = await fetch("https://api.groq.com/openai/v1/audio/transcriptions", { method: "POST", headers: { "Authorization": `Bearer ${GROQ_API_KEY}` }, body: formData });
                const data = await groqResponse.json(); return data.error ? null : data.text; 
            } catch (error) { return null; }
        }

        async function escucharTelegram() {
            if (TELEGRAM_TOKEN.includes("PEGAR_AQUI")) return; 
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`); const data = await response.json();
                if (data.ok && data.result.length > 0) {
                    for (const item of data.result) {
                        lastUpdateId = item.update_id; const chatId = item.message?.chat?.id; let textoOriginal = "";
                        if (item.message && item.message.text) { textoOriginal = item.message.text; } 
                        else if (item.message && item.message.voice) {
                            const fileId = item.message.voice.file_id; const fileResponse = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/getFile?file_id=${fileId}`); const fileData = await fileResponse.json();
                            const downloadUrl = `https://api.telegram.org/file/bot${TELEGRAM_TOKEN}/${fileData.result.file_path}`;
                            await responderTelegram(chatId, "🎧 Analizando audio..."); textoOriginal = await transcribirAudio(downloadUrl);
                            if (!textoOriginal) { await responderTelegram(chatId, "❌ No entendí el audio."); continue; }
                        }
                        if (textoOriginal && textoOriginal !== "") {
                            const datosExtraidos = await procesarMensajeConIA(textoOriginal);
                            tasks.push({ id: Date.now(), title: datosExtraidos.titulo, desc: "🤖 " + textoOriginal, date: datosExtraidos.fecha, color: datosExtraidos.color, subtasks: [] });
                            await guardarTareasLocalmente(); updateDashboard();
                            await responderTelegram(chatId, `✅ Agendado:\n📌 ${datosExtraidos.titulo}\n📅 Fecha: ${datosExtraidos.fecha}`);
                        }
                    }
                }
            } catch (error) {}
        }
        setInterval(escucharTelegram, 3000);
    </script>
